version: '3.9'

services:
  # Production web server
  web:
    build:
      context: .
      dockerfile: deployment/Dockerfile
      target: production
    container_name: mytemplate-prod
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - APP_ENV=production
      - JULIA_PROJECT=/app
    volumes:
      - /app/logs:/app/logs
    command: julia --project=/app -O 3 server.jl
    restart: always
    networks:
      - mytemplate-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ai-help/config"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mytemplate-prod-network:
    driver: bridge
